name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    name: pipeline (python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
          pip install pytest

      - name: ruff
        run: ruff check pipeline/code

      - name: vulture
        run: vulture pipeline/code --min-confidence 80 --exclude .venv

      - name: mypy --strict
        run: mypy --strict --explicit-package-bases --config-file pipeline/pyproject.toml pipeline

      - name: pytest
        run: PYTHONPATH=. pytest pipeline/code/tests -q

  frontend:
    name: frontend (node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE: ""
      NEXT_PUBLIC_API_KEY: ci-build-only
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: eslint
        run: npm run lint

      - name: next build
        run: npm run build
