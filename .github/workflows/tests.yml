name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    name: pipeline (python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: ruff
        run: ruff check ploverai

      - name: vulture
        run: vulture ploverai --min-confidence 80 --exclude .venv

      - name: mypy --strict
        run: mypy --strict --explicit-package-bases --config-file pyproject.toml ploverai

      - name: pytest
        run: pytest ploverai/tests -q

  frontend:
    name: frontend (node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE: ""
      NEXT_PUBLIC_API_KEY: ci-build-only
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: eslint
        run: npm run lint

      - name: next build
        run: npm run build
